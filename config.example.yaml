skills:
  include_catalog: true
  auto_detect: true
  # Default: true
  auto_refresh: true
  # ask  - create an approval before installing a missing skill
  # auto - install automatically when the agent calls skill.ensure / skill.install
  # deny - never install skills at runtime
  # Default: auto for `runtime.profile: desktop`; ask in production.
  install_policy: auto
  # Number of candidate skills to consider when resolving a missing capability.
  # Default: 5
  ensure_limit: 5
  dirs:
    - ./.hopclaw/skills

hosts:
  # Optional: enable the managed browser helper.
  # With only enabled: true, HopClaw starts it on demand and stops it when idle.
  # For an external helper, set base_url/auth_token instead and start it with:
  #   hopclaw-browserd -listen 127.0.0.1:9223
  browser:
    # enabled: true
    # base_url: http://127.0.0.1:9223
    # auth_token: ${HOPCLAW_BROWSER_TOKEN}
  # Optional: enable the managed desktop helper.
  # With only enabled: true, HopClaw starts it on demand and stops it when idle.
  # For an external helper, set base_url/auth_token instead and start it with:
  #   hopclaw-desktopd -listen 127.0.0.1:9224
  desktop:
    # enabled: true
    # base_url: http://127.0.0.1:9224
    # auth_token: ${HOPCLAW_DESKTOP_TOKEN}

models:
  openai_compat:
    base_url: ${OPENAI_BASE_URL}
    api_key: ${OPENAI_API_KEY}
    model: ${OPENAI_MODEL}
    timeout: 60s

tools:
  builtins:
    # Default: true
    enabled: true
    # Default: .
    root: .
    # Default: 30s
    default_exec_timeout: 30s
    # Default: 262144
    max_read_bytes: 262144
  local_exec:
    # Default: true
    enabled: true
    # Default: 30s
    default_timeout: 30s
  capabilities:
    exec:
      mode: approve
      timeout: 30s
      max_output: 1048576
    net:
      allow_private: false
      allow_local: true
      max_download: 10485760
    fs:
      skip_dirs:
        - .git
        - node_modules
        - vendor
        - __pycache__
        - .venv
    layer2:
      # Browser automation is intentionally omitted in this release.
      git: true
      media: true
      container: true
      packages: true
      search: true
      speech: true
      email: true
  services:
    # Optional: enables search.web / search.news when configured.
    search:
      provider: tavily
      api_key: ${TAVILY_API_KEY}
    # Optional: enables speech.tts / speech.stt when configured.
    speech:
      base_url: ${OPENAI_BASE_URL}
      api_key: ${OPENAI_API_KEY}
      model: gpt-4o-mini-tts
    # Optional: enables email.send only in this release.
    email:
      smtp_host: ${SMTP_HOST}
      smtp_port: 587
      username: ${SMTP_USERNAME}
      password: ${SMTP_PASSWORD}
      from: ${SMTP_FROM}
