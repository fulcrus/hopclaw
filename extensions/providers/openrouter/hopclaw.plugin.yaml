name: openrouter
version: "1.0.0"
description: OpenRouter model provider bundle

providers:
  openrouter:
    api: openai-completions
    base_url: https://openrouter.ai/api/v1
    default_model: auto
    api_key_hint: Set OPENROUTER_API_KEY environment variable
    env_vars:
      - OPENROUTER_API_KEY
