name: sample-http-tools
version: "0.1.0"
description: Minimal external HTTP tool template for HopClaw
author: HopClaw Example

tools:
  - name: sample.echo
    description: Echo input text through an external HTTP service
    endpoint: "http://127.0.0.1:18082/invoke"
    timeout: 10s
    input_schema:
      type: object
      properties:
        text:
          type: string
          description: Text to echo back
      required:
        - text
