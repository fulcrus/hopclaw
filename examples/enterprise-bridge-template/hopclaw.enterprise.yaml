server:
  address: 127.0.0.1:16280
  auth_token: ${HOPCLAW_AUTH_TOKEN}

store:
  backend: sqlite
  path: ./.hopclaw/state

runtime:
  profile: production
  audit:
    enabled: true
    output: ./.hopclaw/audit.jsonl
    sinks:
      - name: audit-hub
        webhook:
          url: http://127.0.0.1:18081/audit/events
          timeout: 5s
          headers:
            X-Bridge-Token: ${BRIDGE_SHARED_TOKEN}

auth:
  api_keys:
    - key: ${HOPCLAW_OPERATOR_KEY}
      name: operator
      enabled: true

authz:
  fallback: deny
  webhook:
    url: http://127.0.0.1:18081/authz/decide
    timeout: 3s
    headers:
      X-Bridge-Token: ${BRIDGE_SHARED_TOKEN}
