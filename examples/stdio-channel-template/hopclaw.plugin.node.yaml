name: sample-echo-channel
version: "0.1.0"
description: Minimal stdio channel plugin template for HopClaw (Node.js variant)
author: HopClaw Example

channels:
  sample-echo:
    type: stdio
    command: "node"
    args:
      - "./node/echo_channel.mjs"
    capabilities:
      - send
    config:
      channel_id: "sample-echo"
      echo_prefix: "Echo"
    max_restarts: 5
