groups:
  - name: hopclaw-enterprise
    interval: 30s
    rules:
      - alert: HopClawInstanceDown
        expr: up{job="hopclaw"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: HopClaw instance is down
          description: Prometheus cannot scrape the HopClaw target.

      - alert: HopClawHTTPP95High
        expr: histogram_quantile(0.95, sum by (le) (rate(hopclaw_http_request_duration_seconds_bucket[10m]))) > 5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: HopClaw HTTP p95 latency is high
          description: The p95 latency across the HTTP surface stayed above 5s for 10 minutes.

      - alert: HopClawAuditDeadLetter
        expr: increase(hopclaw_audit_delivery_attempts_total{result="dead_letter"}[5m]) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: HopClaw audit delivery reached dead-letter
          description: At least one audit delivery exhausted retries in the last 5 minutes.

      - alert: HopClawAuditRetryStorm
        expr: increase(hopclaw_audit_delivery_attempts_total{result="retry_scheduled"}[10m]) > 25
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: HopClaw audit delivery is retrying heavily
          description: Audit delivery scheduled more than 25 retries in 10 minutes.

      - alert: HopClawModelErrorRateHigh
        expr: increase(hopclaw_model_call_errors_total[10m]) > 10
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: HopClaw model error rate is elevated
          description: Model call errors exceeded 10 in the last 10 minutes.
