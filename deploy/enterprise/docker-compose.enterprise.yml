services:
  hopclaw:
    image: ${HOPCLAW_IMAGE:-hopclaw:latest}
    container_name: hopclaw-enterprise
    restart: unless-stopped
    environment:
      HOPCLAW_CONFIG: /etc/hopclaw/config.yaml
      HOPCLAW_AUTH_TOKEN: ${HOPCLAW_AUTH_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      AUDIT_ELASTICSEARCH_URL: ${AUDIT_ELASTICSEARCH_URL:-}
      AUDIT_ELASTICSEARCH_API_KEY: ${AUDIT_ELASTICSEARCH_API_KEY:-}
      AUDIT_SPLUNK_HEC_URL: ${AUDIT_SPLUNK_HEC_URL:-}
      AUDIT_SPLUNK_HEC_TOKEN: ${AUDIT_SPLUNK_HEC_TOKEN:-}
    volumes:
      - ./config.enterprise.yaml.example:/etc/hopclaw/config.yaml:ro
      - hopclaw-data:/home/hopclaw/.hopclaw
    expose:
      - "16280"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:16280/healthz >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  caddy:
    image: caddy:2.10-alpine
    container_name: hopclaw-edge
    restart: unless-stopped
    depends_on:
      hopclaw:
        condition: service_healthy
    environment:
      HOPCLAW_PUBLIC_HOST: ${HOPCLAW_PUBLIC_HOST}
      TLS_EMAIL: ${TLS_EMAIL:-}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  hopclaw-data:
  caddy-data:
  caddy-config:
