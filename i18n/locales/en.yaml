landing:
  title: "HopClaw Local Runtime"
  tagline: "This is a local runtime for tool-using agents. The current release ships a local dashboard, HTTP API, approvals, artifacts, skills, and built-in tools."
  scope_title: "What Ships Now"
  scope_body: "The runtime includes queued runs, context compaction, OpenAI-compatible model wiring, tool execution, approvals, artifacts, event streams, and SKILL.md compatibility."
  web_title: "Web Surface"
  web_body: "This release exposes a local dashboard and HTTP API for operating the runtime on your machine. It is a local operator surface, not a hosted multi-tenant control plane."
  install_title: "Local Install"
  install_body: "You can install the runtime as hopclaw, and you can also install an openclaw command for local compatibility with existing scripts."
  compat_title: "OpenClaw Compatibility"
  compat_body: "The runtime keeps .openclaw skill discovery compatibility and accepts the X-OpenClaw-Token header so older local clients can keep working."
  api_title: "API Entry Points"
  api_body: "Run status, tool manifests, approval tickets, artifacts, and events are exposed over HTTP. Keep it local and protect it with a token."
  quick_title: "Quick Commands"
  quick_command_install: "go install github.com/fulcrus/hopclaw/cmd/hopclaw@latest\ngo install github.com/fulcrus/hopclaw/cmd/openclaw@latest"
  quick_command_binary: "hopclaw -config ./local.yaml\nopenclaw -config ./local.yaml"
  quick_command_tools: "curl -H \"Authorization: Bearer $HOPCLAW_AUTH_TOKEN\" http://127.0.0.1:16280/runtime/tools"
  english_label: "English"
  chinese_label: "中文"
  repository_label: "Project"
  repository_value: "HopClaw runtime"
  health_label: "Health"
  tools_label: "Tools"
  approvals_label: "Approvals"

