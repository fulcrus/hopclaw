name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  binaries:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Derive release channel
        id: channel
        run: |
          ref="${GITHUB_REF_NAME#v}"
          channel="stable"
          case "$ref" in
            *-nightly* ) channel="nightly" ;;
            *-* ) channel="beta" ;;
          esac
          echo "value=$channel" >> "$GITHUB_OUTPUT"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOPCLAW_RELEASE_CHANNEL: ${{ steps.channel.outputs.value }}

      - name: Upload release checksums
        uses: actions/upload-artifact@v4
        with:
          name: release-checksums
          path: dist/checksums.txt
          if-no-files-found: error

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: binaries
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set build date
        id: build_date
        run: echo "value=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Derive release channel
        id: channel
        run: |
          ref="${GITHUB_REF_NAME#v}"
          channel="stable"
          case "$ref" in
            *-nightly* ) channel="nightly" ;;
            *-* ) channel="beta" ;;
          esac
          echo "value=$channel" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/hopclaw
            name=${{ env.DOCKERHUB_USERNAME }}/hopclaw,enable=${{ env.DOCKERHUB_USERNAME != '' }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
          labels: |
            org.opencontainers.image.title=HopClaw
            org.opencontainers.image.description=Tool-using agent runtime and gateway
            org.opencontainers.image.licenses=Apache-2.0

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.ref_name }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ steps.build_date.outputs.value }}
            CHANNEL=${{ steps.channel.outputs.value }}

  homebrew:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: binaries

    steps:
      - name: Check out default branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Download release checksums
        uses: actions/download-artifact@v4
        with:
          name: release-checksums
          path: .tmp/release

      - name: Render Homebrew formula
        run: |
          chmod +x ./scripts/render_homebrew_formula.sh
          ./scripts/render_homebrew_formula.sh \
            "${GITHUB_REF_NAME#v}" \
            "${GITHUB_REPOSITORY}" \
            ".tmp/release/checksums.txt" \
            "Formula/hopclaw.rb"

      - name: Commit formula update
        run: |
          if git diff --quiet -- Formula/hopclaw.rb; then
            echo "Formula already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/hopclaw.rb
          git commit -m "chore(release): update Homebrew formula for ${GITHUB_REF_NAME}"
          git push origin HEAD:main
