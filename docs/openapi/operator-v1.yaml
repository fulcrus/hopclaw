openapi: 3.1.0
info:
  title: HopClaw Operator API
  version: '1.0'
  description: Machine-readable OpenAPI document for the current HopClaw operator and control-plane surface under /operator/*. This API evolves faster than the runtime API, so nested payloads are intentionally modeled as open objects unless they are already stable and obvious from the live handlers.
servers:
- url: http://127.0.0.1:16280
  description: Local default server
security:
- bearerAuth: []
tags:
- name: Core
  description: General operator status, auth, capabilities, nodes, devices, and instances.
- name: Browser
  description: Browser session and browser profile management.
- name: Helpers
  description: Managed helper process inventory and reclaim actions.
- name: Devices
  description: Pairing, trust, and token management for companion devices.
- name: Diagnostics
  description: Telemetry, sandbox, metrics, and wire diagnostics.
- name: Automation
  description: Automation templates, watch items, wakeup triggers, and cron jobs.
- name: Control Plane
  description: Approvals, policy engines, and setup/control-plane snapshots.
- name: Governance
  description: Governance deliveries, adapters, health, and event streams.
- name: Audit
  description: Audit sinks, deliveries, stats, and event listings.
- name: Setup
  description: Setup catalog and setup-completion status.
- name: Config
  description: Operator config inspection, section updates, preview, and validation.
- name: Models
  description: Model provider CRUD, router views, validation, and test chat.
- name: Assets
  description: Artifacts and pairing asset views.
- name: Pairing
  description: Channel pairing creation, verification, and revocation.
- name: Channels
  description: Channel CRUD, health, capability matrix, and allowlists.
- name: Tools
  description: Operator-side tool execution probes.
- name: Skills
  description: Installed skills, catalog views, install flows, and skill config.
- name: Knowledge
  description: Knowledge source CRUD and search/sync operations.
- name: Hooks
  description: Webhook and hook registry management plus replay/fire operations.
- name: Plugins
  description: Plugin install, inspect, enable/disable, and uninstall flows.
- name: Usage
  description: Usage, provider, session, and daily roll-up views.
- name: Quality
  description: Quality summaries, release readiness, and eval execution.
- name: Discovery
  description: Peer discovery inventory and resolver status.
