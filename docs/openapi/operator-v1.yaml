components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API token
  responses:
    Error:
      description: Error response.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
      additionalProperties: true
    OpenObject:
      type: object
      description: Open JSON object used for faster-moving operator payloads.
      additionalProperties: true
    OpenValue:
      description: Any JSON value accepted or returned by operator config mutation endpoints.
      oneOf:
      - type: object
        additionalProperties: true
      - type: array
        items:
          $ref: '#/components/schemas/OpenValue'
      - type: string
      - type: integer
      - type: number
      - type: boolean
      - type: 'null'
    CountedItemsResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/OpenValue'
        count:
          type: integer
      additionalProperties: true
    PluginInstallRequest:
      type: object
      properties:
        source:
          type: string
      required:
      - source
      additionalProperties: true
    HelperReclaimRequest:
      type: object
      properties:
        name:
          type: string
      required:
      - name
      additionalProperties: true
