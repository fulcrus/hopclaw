# Docker Compose automatically loads `.env` when present.
services:
  gateway:
    build:
      context: .
      args:
        VERSION: ${VERSION:-dev}
        GIT_COMMIT: ${GIT_COMMIT:-local}
        BUILD_DATE: ${BUILD_DATE:-unknown}
        CHANNEL: ${CHANNEL:-stable}
    image: hopclaw:local
    container_name: hopclaw-gateway
    restart: unless-stopped
    ports:
      - "16280:16280"
    volumes:
      - ./config.yaml:/etc/hopclaw/config.yaml:ro
      - hopclaw-data:/home/hopclaw/.hopclaw
    environment:
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      HOPCLAW_AUTH_TOKEN: ${HOPCLAW_AUTH_TOKEN:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:16280/healthz >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  hopclaw-data:
